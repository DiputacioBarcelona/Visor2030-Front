  d.x = d.SDG + (Math.random() - 0.5) * 0.4;
});

const x = d3.scaleLinear()
    .domain([0.5, 17.5])
    .range([margin.left, width - margin.right]);

const y = d3.scaleLinear()
    .domain([0, 100])
    .range([height - margin.bottom, margin.top]);

// Brushing layer (behind points)
const brush = d3.brush()
    .extent([[margin.left, margin.top], [width - margin.right, height - margin.bottom]])
    .on("end", brushed);

svg.select(".brush").call(brush);

// Points on top
const circles = svg.selectAll("circle")
    .data(data)
    .enter().append("circle")
    .attr("cx", d => x(d.x))
    .attr("cy", d => y(d.Value))
    .attr("r", 3)
    .attr("fill", d => sdgColors[d.SDG - 1])
    .attr("opacity", 0.6)
    .attr("data-sdg", d => d.SDG)
    .attr("data-muni", d => d.Municipality)
    .on("mouseover", function(event, d) {
        tooltip.transition().duration(200).style("opacity", 0.9);
        tooltip.html("Municipality: " + d.Municipality + "<br/>SDG: " + d.SDG + "<br/>Value: " + d.Value.toFixed(2))
               .style("left", (event.pageX + 10) + "px")
               .style("top", (event.pageY - 28) + "px");
    })
    .on("mouseout", function() {
        tooltip.transition().duration(500).style("opacity", 0);
    });

function brushed({selection}) {
  if (!selection) {
    // Reset all circles to original color
    circles
      .attr("fill", d => sdgColors[d.SDG - 1])
      .attr("opacity", 0.6);
    return;
  }

  const [[x0, y0], [x1, y1]] = selection;
  const selectedMunicipalities = new Set();

  circles.each(function(d) {
    if (x(d.x) >= x0 && x(d.x) <= x1 && y(d.Value) >= y0 && y(d.Value) <= y1) {
      selectedMunicipalities.add(d.Municipality);
    }
  });

  circles
    .attr("fill", d => selectedMunicipalities.has(d.Municipality) ? sdgColors[d.SDG - 1] : "#ccc")
    .attr("opacity", d => selectedMunicipalities.has(d.Municipality) ? 0.9 : 0.3);
}

// Axes
const xAxis = d3.axisBottom(d3.scaleLinear().domain([1, 17]).range([x(1), x(17)])).ticks(17).tickFormat(d3.format("d"));
const yAxis = d3.axisLeft(y);
svg.append("g").attr("transform", "translate(0," + (height - margin.bottom) + ")").call(xAxis);
svg.append("g").attr("transform", "translate(" + margin.left + ",0)").call(yAxis);
</script>
</body>
</html>
